name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml   # bump_version.yml がバージョン更新後にトリガー

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC trusted publishing（トークン不要）

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ビルド
        run: |
          pip install build
          python -m build

      - name: PyPI へ公開
        uses: pypa/gh-action-pypi-publish@release/v1
